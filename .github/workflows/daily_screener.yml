name: Daily Stock Screener

on:
  schedule:
    # Runs every day at 4:00 PM UTC, which is 9:30 PM IST
    # Adjust the cron schedule as needed.
    - cron: '0 16 * * *'
  workflow_dispatch: # Allows manual triggering of the workflow

jobs:
  run-screener:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # Specify your python version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the daily screener
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECIPIENT_EMAILS: ${{ secrets.RECIPIENT_EMAILS }}
        run: python main.py

      - name: Commit and push report
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add .
          # Use `git commit --allow-empty` to ensure a commit happens even if the report is the same
          git commit --allow-empty -m "Automated report and log update for $(date -u +'%Y-%m-%d')"
          git push